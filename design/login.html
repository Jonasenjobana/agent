<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>企业知识库 — 登录</title>
  <script>(function(){var t=localStorage.getItem('kb-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <link rel="stylesheet" href="css/tokens.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-sans);
      font-size: var(--font-size-base);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: var(--space-xl);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-2xl);
    }
    .login-brand {
      text-align: center;
      margin-bottom: var(--space-2xl);
    }
    .login-logo {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: var(--radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: var(--space-lg);
    }
    .login-title {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--fg);
      margin-bottom: var(--space-xs);
    }
    .login-subtitle {
      font-size: var(--font-size-base);
      color: var(--fg-secondary);
    }
    .form-group {
      margin-bottom: var(--space-lg);
    }
    .form-label {
      display: block;
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--fg);
      margin-bottom: var(--space-sm);
    }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--fg);
      font-size: var(--font-size-base);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }
    .form-input::placeholder { color: var(--fg-tertiary); }
    .login-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: var(--font-size-base);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .login-btn:hover { background: var(--accent-hover); }
    .login-btn:active { transform: scale(0.98); }
    .login-error {
      color: var(--danger);
      font-size: var(--font-size-sm);
      text-align: center;
      margin-top: var(--space-md);
      min-height: 20px;
    }
    .login-footer {
      text-align: center;
      margin-top: var(--space-xl);
      font-size: var(--font-size-sm);
      color: var(--fg-tertiary);
    }

    /* Theme toggle */
    .login-theme-btn {
      position: fixed;
      top: var(--space-lg);
      right: var(--space-lg);
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      color: var(--fg-secondary);
      font-size: 16px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all var(--transition-fast);
      z-index: 100;
    }
    .login-theme-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <button class="login-theme-btn" onclick="toggleTheme()" id="loginThemeBtn" title="切换夜间/白天模式">🌙</button>
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">KB</div>
        <div class="login-title">企业知识库</div>
        <div class="login-subtitle">AI 智能知识管理系统</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="username">账号</label>
        <input class="form-input" id="username" type="text" placeholder="请输入用户名或邮箱" autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input class="form-input" id="password" type="password" placeholder="请输入密码" autocomplete="current-password" />
      </div>

      <button class="login-btn" id="loginBtn">登 录</button>

      <div class="login-error" id="loginError"></div>

      <div class="login-footer">
        © 2026 企业知识库系统 v2.0
      </div>
    </div>
  </div>

  <script>
    (function() {
      var btn = document.getElementById('loginBtn');
      var username = document.getElementById('username');
      var password = document.getElementById('password');
      var error = document.getElementById('loginError');

      function doLogin() {
        error.textContent = '';
        var u = username.value.trim();
        var p = password.value.trim();
        if (!u || !p) {
          error.textContent = '请输入账号和密码';
          return;
        }
        // Simulate login — navigate to main app
        btn.textContent = '登录中…';
        btn.disabled = true;
        setTimeout(function() {
          window.location.href = 'index.html';
        }, 600);
      }

      btn.addEventListener('click', doLogin);
      password.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
      });
      username.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') password.focus();
      });
      // Theme toggle button icon
      updateThemeIcon();
    })();
    function toggleTheme() {
      var html = document.documentElement;
      var isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) { html.removeAttribute('data-theme'); localStorage.setItem('kb-theme', 'light'); }
      else { html.setAttribute('data-theme', 'dark'); localStorage.setItem('kb-theme', 'dark'); }
      updateThemeIcon();
    }
    function updateThemeIcon() {
      var btn = document.getElementById('loginThemeBtn');
      if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
    }
  </script>
</body>
</html>
